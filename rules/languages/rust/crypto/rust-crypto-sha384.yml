rules:
  - id: rust-crypto-sha384
    message: SHA384 hash function usage detected
    severity: INFO
    languages:
      - rust
    patterns:
      - pattern-either:
          - pattern: ring::digest::digest(&ring::digest::SHA384, $DATA)
          - pattern: ring::digest::SHA384
          - pattern: sha2::Sha384::new()
          - pattern: sha2::Sha384::default()
          - pattern: sha2::Sha384::from($DATA)
          - pattern: |
              let mut $HASHER = sha2::Sha384::new();
              $HASHER.update($DATA);
              let $HASH = $HASHER.finalize();
          - pattern: |
              let mut $HASHER = sha2::Sha384::new();
              $HASHER.update($DATA);
              $HASHER.finalize_into($OUTPUT);
          - pattern: |
              use sha2::{Sha384, Digest};
              let mut $HASHER = Sha384::new();
              $HASHER.update($DATA);
              $HASHER.finalize()
          - pattern: crypto::sha2::Sha384::new()
          - pattern: openssl::hash::hash(openssl::hash::MessageDigest::sha384(), $DATA)
          - pattern: |
              let $MD = openssl::hash::MessageDigest::sha384();
              openssl::hash::hash($MD, $DATA)
          - pattern: openssl::hash::Hasher::new(openssl::hash::MessageDigest::sha384())
          - pattern: |
              let mut $HASHER = openssl::hash::Hasher::new(openssl::hash::MessageDigest::sha384());
              $HASHER.update($DATA);
              $HASHER.finish()
          - pattern: |
              use digest::Digest;
              let mut $HASHER: Box<dyn Digest> = Box::new(sha2::Sha384::new());
              $HASHER.update($DATA);
              $HASHER.finalize()
          - pattern: |
              async fn $FUNC() {
                  let mut $HASHER = sha2::Sha384::new();
                  $HASHER.update($DATA);
                  $HASHER.finalize()
              }
      - pattern-not-inside: |
          #[test]
          fn $TEST() {
              ...
          }
      - pattern-not-inside: |
          #[cfg(test)]
          mod $MODULE {
              ...
          }
      - pattern-not-inside: |
          mod tests {
              ...
          }
    metadata:
      category: crypto
      cwe: CWE-327
      impact: "Inventory: SHA384 hash function usage detected in codebase"
